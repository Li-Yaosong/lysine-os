name: Bootstrap

on:
  push:
    branches: [main, staging, 'phase/*']
    paths:
      - 'ribosome/**'
      - 'nucleus/**'
      - 'configs/versions.lock'
      - '.github/workflows/bootstrap.yml'
      - '.github/actions/setup-ribosome/**'
  pull_request:
    branches: [main]
    paths:
      - 'ribosome/**'
      - 'nucleus/**'
      - 'configs/versions.lock'
      - '.github/workflows/bootstrap.yml'
      - '.github/actions/setup-ribosome/**'
  workflow_dispatch:
    inputs:
      phase:
        description: 'Phase to run (fetch | cross-toolchain | temp-tools | base-system | kernel | all)'
        required: false
        default: 'all'
        type: choice
        options:
          - fetch
          - cross-toolchain
          - temp-tools
          - base-system
          - kernel
          - all

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: "1.90"
  BOOTSTRAP_BASE: /var/ribosome/bootstrap
  # Cache key prefix for vacuole (source tarballs). Bump when CAS layout changes.
  VACUOLE_CACHE_KEY: vacuole-sources-v3
  # Version lock file ensures reproducible builds across CI runs.
  VERSIONS_LOCK: configs/versions.lock
  # Mirror config for source URL rewriting (used by ribosome fetch).
  RIBOSOME_MIRROR_FILE: ${{ github.workspace }}/configs/mirrors.conf

concurrency:
  # Only cancel in-progress runs for push/PR events (fast-iteration dev loop).
  # For manual dispatch, never cancel — long-running builds shouldn't be wasted.
  group: bootstrap-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'workflow_dispatch' }}

jobs:
  # -------------------------------------------------------
  # Job 1: Fetch all source tarballs
  # Always runs — every downstream phase needs the vacuole cache.
  # -------------------------------------------------------
  fetch:
    name: Fetch Sources
    runs-on: ubuntu-latest
    timeout-minutes: 30  # ~80 tarballs, mostly cached after first run
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-ribosome

      - name: Cache vacuole (source tarballs)
        id: cache-vacuole
        uses: actions/cache@v4
        with:
          path: ${{ env.BOOTSTRAP_BASE }}/cache
          key: ${{ env.VACUOLE_CACHE_KEY }}-${{ hashFiles('nucleus/**/*.mRNA') }}
          restore-keys: |
            ${{ env.VACUOLE_CACHE_KEY }}-

      - name: Fetch all sources
        run: |
          ./ribosome/target/release/ribosome-cli fetch nucleus/core/ \
            --cache-dir ${{ env.BOOTSTRAP_BASE }}/cache

  # -------------------------------------------------------
  # Job 2: Cross-toolchain (LFS Chapter 5)
  # Produces /tools with cross-binutils, cross-gcc, cross-glibc.
  # -------------------------------------------------------
  cross-toolchain:
    name: "Phase: cross-toolchain"
    needs: fetch
    runs-on: ubuntu-latest
    timeout-minutes: 60  # gcc + glibc cross build
    if: |
      github.event_name != 'workflow_dispatch' ||
      inputs.phase == 'all' ||
      inputs.phase == 'cross-toolchain'
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-ribosome

      - name: Restore vacuole cache
        uses: actions/cache@v4
        with:
          path: ${{ env.BOOTSTRAP_BASE }}/cache
          key: ${{ env.VACUOLE_CACHE_KEY }}-${{ hashFiles('nucleus/**/*.mRNA') }}
          restore-keys: |
            ${{ env.VACUOLE_CACHE_KEY }}-

      - name: Bootstrap cross-toolchain
        run: |
          ./ribosome/target/release/ribosome-cli bootstrap \
            --phase cross-toolchain \
            --nucleus-dir nucleus/core \
            --build-root ${{ env.BOOTSTRAP_BASE }}/build \
            --cache-dir ${{ env.BOOTSTRAP_BASE }}/cache \
            --lock-file ${{ env.VERSIONS_LOCK }} \
            --continue-on-error

      - name: Verify cross-toolchain artifacts
        if: always()
        run: |
          echo "=== Cross-toolchain verification ==="
          ls -la ${{ env.BOOTSTRAP_BASE }}/tools/bin/ || true
          echo ""
          echo "Tool count: $(find ${{ env.BOOTSTRAP_BASE }}/tools/bin -type f 2>/dev/null | wc -l)"

      - name: Upload tools artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cross-toolchain
          path: ${{ env.BOOTSTRAP_BASE }}/tools/
          retention-days: 3
          overwrite: true

  # -------------------------------------------------------
  # Job 3: Temp-tools (LFS Chapter 6)
  # Builds on top of cross-toolchain's /tools (accumulated).
  # -------------------------------------------------------
  temp-tools:
    name: "Phase: temp-tools"
    needs: cross-toolchain
    runs-on: ubuntu-latest
    timeout-minutes: 180  # ~16 packages incl. native gcc (no bootstrap)
    if: |
      github.event_name != 'workflow_dispatch' ||
      inputs.phase == 'all' ||
      inputs.phase == 'temp-tools'
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-ribosome

      - name: Restore vacuole cache
        uses: actions/cache@v4
        with:
          path: ${{ env.BOOTSTRAP_BASE }}/cache
          key: ${{ env.VACUOLE_CACHE_KEY }}-${{ hashFiles('nucleus/**/*.mRNA') }}
          restore-keys: |
            ${{ env.VACUOLE_CACHE_KEY }}-

      - name: Download cross-toolchain artifact
        uses: actions/download-artifact@v4
        with:
          name: cross-toolchain
          path: ${{ env.BOOTSTRAP_BASE }}/tools/

      - name: Bootstrap temp-tools
        run: |
          export PATH="${{ env.BOOTSTRAP_BASE }}/tools/bin:$PATH"
          ./ribosome/target/release/ribosome-cli bootstrap \
            --phase temp-tools \
            --nucleus-dir nucleus/core \
            --build-root ${{ env.BOOTSTRAP_BASE }}/build \
            --cache-dir ${{ env.BOOTSTRAP_BASE }}/cache \
            --lock-file ${{ env.VERSIONS_LOCK }} \
            --continue-on-error

      - name: Verify temp-tools artifacts
        if: always()
        run: |
          echo "=== Temp-tools verification ==="
          ls -la ${{ env.BOOTSTRAP_BASE }}/tools/bin/ | head -30 || true
          echo ""
          echo "Tool count: $(find ${{ env.BOOTSTRAP_BASE }}/tools/bin -type f 2>/dev/null | wc -l)"

      - name: Upload tools artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: temp-tools
          path: ${{ env.BOOTSTRAP_BASE }}/tools/
          retention-days: 3
          overwrite: true

  # -------------------------------------------------------
  # Job 4: Base-system (LFS Chapter 7-8, no chroot)
  # Builds the final sysroot using temp-tools.
  # -------------------------------------------------------
  base-system:
    name: "Phase: base-system"
    needs: temp-tools
    runs-on: ubuntu-latest
    timeout-minutes: 240  # gcc + glibc native rebuild, heaviest phase (~3-4h)
    if: |
      github.event_name != 'workflow_dispatch' ||
      inputs.phase == 'all' ||
      inputs.phase == 'base-system'
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-ribosome

      - name: Restore vacuole cache
        uses: actions/cache@v4
        with:
          path: ${{ env.BOOTSTRAP_BASE }}/cache
          key: ${{ env.VACUOLE_CACHE_KEY }}-${{ hashFiles('nucleus/**/*.mRNA') }}
          restore-keys: |
            ${{ env.VACUOLE_CACHE_KEY }}-

      - name: Download temp-tools artifact
        uses: actions/download-artifact@v4
        with:
          name: temp-tools
          path: ${{ env.BOOTSTRAP_BASE }}/tools/

      - name: Bootstrap base-system
        run: |
          export PATH="${{ env.BOOTSTRAP_BASE }}/tools/bin:$PATH"
          ./ribosome/target/release/ribosome-cli bootstrap \
            --phase base-system \
            --nucleus-dir nucleus/core \
            --build-root ${{ env.BOOTSTRAP_BASE }}/build \
            --cache-dir ${{ env.BOOTSTRAP_BASE }}/cache \
            --lock-file ${{ env.VERSIONS_LOCK }} \
            --continue-on-error

      - name: Verify sysroot artifacts
        if: always()
        run: |
          echo "=== Sysroot verification ==="
          ls -la ${{ env.BOOTSTRAP_BASE }}/sysroot/ || true
          echo ""
          echo "=== Key files check ==="
          for f in usr/bin/bash usr/bin/ls usr/lib/libc.so.6 usr/lib/systemd/systemd; do
            if [[ -e ${{ env.BOOTSTRAP_BASE }}/sysroot/$f ]]; then
              echo "  [OK] /$f"
            else
              echo "  [MISSING] /$f"
            fi
          done

      - name: Upload sysroot artifact (key files only)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sysroot-key-files
          path: |
            ${{ env.BOOTSTRAP_BASE }}/sysroot/usr/bin/
            ${{ env.BOOTSTRAP_BASE }}/sysroot/usr/lib/
            ${{ env.BOOTSTRAP_BASE }}/sysroot/etc/
          retention-days: 3
          overwrite: true

  # -------------------------------------------------------
  # Job 5: Kernel
  # Needs: temp-tools (for the toolchain).
  # Sequenced after base-system to preserve LFS chapter order,
  # though kernel does not consume base-system artifacts directly.
  # -------------------------------------------------------
  kernel:
    name: "Phase: kernel"
    needs: base-system
    runs-on: ubuntu-latest
    timeout-minutes: 60  # Linux kernel build with moderate config
    if: |
      github.event_name != 'workflow_dispatch' ||
      inputs.phase == 'all' ||
      inputs.phase == 'kernel'
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-ribosome
        with:
          extra-apt-packages: libelf-dev

      - name: Restore vacuole cache
        uses: actions/cache@v4
        with:
          path: ${{ env.BOOTSTRAP_BASE }}/cache
          key: ${{ env.VACUOLE_CACHE_KEY }}-${{ hashFiles('nucleus/**/*.mRNA') }}
          restore-keys: |
            ${{ env.VACUOLE_CACHE_KEY }}-

      - name: Download temp-tools artifact
        uses: actions/download-artifact@v4
        with:
          name: temp-tools
          path: ${{ env.BOOTSTRAP_BASE }}/tools/

      - name: Bootstrap kernel
        run: |
          export PATH="${{ env.BOOTSTRAP_BASE }}/tools/bin:$PATH"
          ./ribosome/target/release/ribosome-cli bootstrap \
            --phase kernel \
            --nucleus-dir nucleus/core \
            --build-root ${{ env.BOOTSTRAP_BASE }}/build \
            --cache-dir ${{ env.BOOTSTRAP_BASE }}/cache \
            --lock-file ${{ env.VERSIONS_LOCK }} \
            --continue-on-error

      - name: Verify kernel image
        run: |
          echo "=== Kernel image verification ==="
          find ${{ env.BOOTSTRAP_BASE }}/build/linux-kernel-* \( -name "vmlinuz*" -o -name "bzImage" \) 2>/dev/null || true
          find ${{ env.BOOTSTRAP_BASE }}/sysroot/boot -name "vmlinuz*" 2>/dev/null || true

      - name: QEMU boot test
        if: github.event_name == 'push' || github.event_name == 'pull_request'
        continue-on-error: true
        run: |
          echo "=== QEMU Boot Test ==="
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 busybox-static cpio gzip

          shopt -s nullglob
          KERNEL=""
          for f in \
            ${{ env.BOOTSTRAP_BASE }}/build/linux-kernel-*/pkg/boot/vmlinuz-* \
            ${{ env.BOOTSTRAP_BASE }}/build/linux-kernel-*/src/arch/x86/boot/bzImage; do
            if [[ -f "$f" ]]; then
              KERNEL="$f"
              break
            fi
          done

          if [[ -z "$KERNEL" ]]; then
            echo "No kernel image found, skipping boot test"
            exit 0
          fi

          echo "Kernel: $KERNEL"

          INITRD_DIR=$(mktemp -d)
          mkdir -p "$INITRD_DIR"/{bin,sbin,proc,sys,dev,etc,usr/bin,usr/sbin,tmp}

          # Use busybox static binary to provide core utilities in the initrd
          BUSYBOX=$(command -v busybox || echo /bin/busybox)
          cp "$BUSYBOX" "$INITRD_DIR/bin/busybox"
          # Verify busybox applets we need are available
          busybox --list | grep -E "^(sh|uname|poweroff|echo|mount)$" > /dev/null || {
            echo "Warning: some busybox applets may be missing"
            busybox --list | head -20 || true
          }

          for cmd in sh uname poweroff echo mount; do
            ln -s busybox "$INITRD_DIR/bin/$cmd"
          done

          # Build init script with printf to avoid heredoc indentation issues in YAML
          printf '%s\n' \
            '#!/bin/sh' \
            'export PATH=/bin:/usr/bin:/sbin:/usr/sbin' \
            'mount -t proc none /proc 2>/dev/null' \
            'mount -t sysfs none /sys 2>/dev/null' \
            'echo "LysineOS CI Boot Test"' \
            'echo "Kernel: $(uname -r)"' \
            'echo "Arch:   $(uname -m)"' \
            'echo ""' \
            'echo "Boot Test PASSED"' \
            'poweroff -f' > "$INITRD_DIR/init"
          chmod +x "$INITRD_DIR/init"

          INITRD_PATH="${{ env.BOOTSTRAP_BASE }}/ci-test-initrd.cpio.gz"
          (cd "$INITRD_DIR" && find . | cpio -o -H newc 2>/dev/null | gzip -9) > "$INITRD_PATH"
          rm -rf "$INITRD_DIR"

          timeout 120 qemu-system-x86_64 \
            -m 512M \
            -kernel "$KERNEL" \
            -initrd "$INITRD_PATH" \
            -append "console=ttyS0 panic=1 rdinit=/init" \
            -nographic \
            -no-reboot \
            2>&1 | tee /tmp/qemu-boot-test.log || true

          if grep -q "Boot Test PASSED" /tmp/qemu-boot-test.log; then
            echo "QEMU boot test PASSED"
          else
            echo "QEMU boot test FAILED or timed out (non-blocking)"
          fi
