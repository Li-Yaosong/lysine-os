# LysineOS 全局功能开关
#
# 此文件控制所有包的默认功能开关。
# mRNA 文件中的 features 段可覆盖或扩展这些默认值。
# 启用的功能通过 $FEATURE_{NAME}=1 环境变量传递给构建脚本。
#
# 优先级（高 → 低）：环境变量 > 包级 mRNA > features.conf > ribosome.conf

[global]
# 全局默认启用的功能
enabled = ["lto", "strip"]

[per-package]
# GCC 额外功能
gcc = ["dlang", "go"]

# Linux 内核功能
linux-kernel = ["module-signing", "hardened"]

# systemd 功能
systemd = ["pam", "cryptsetup", "networkd"]

# PipeWire 功能
pipewire = ["alsa", "pulseaudio-compat", "jack-compat"]
