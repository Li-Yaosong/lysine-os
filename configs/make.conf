# LysineOS 全局编译标志
#
# 此文件定义所有包构建时的默认编译器标志。
# mRNA 文件中可引用 $CFLAGS、$CXXFLAGS、$LDFLAGS 环境变量。
#
# 优先级（高 → 低）：环境变量 > 包级 mRNA > make.conf > ribosome.conf

# C 编译标志
CFLAGS="-O2 -pipe -march=x86-64-v3 -mtune=generic -fstack-protector-strong"

# C++ 编译标志
CXXFLAGS="-O2 -pipe -march=x86-64-v3 -mtune=generic -fstack-protector-strong"

# 链接器标志
LDFLAGS="-Wl,-O1,--sort-common,--as-needed,-z,relro,-z,now"

# 目标架构
ARCH="x86_64"

# 安装前缀
PREFIX="/usr"

# 并行编译任务数（0 = 自动检测 CPU 核心数）
JOBS=0
