# Ribosome mirror configuration
# Format: old_prefix=new_prefix
# Lines starting with # are comments.
#
# These mirrors are used by `ribosome fetch` to replace source URLs when
# the original upstream is unreachable. Mirror URLs are tried first.
#
# Environment variable alternative:
#   RIBOSOME_MIRROR_0="https://ftp.gnu.org/gnu/=https://mirrors.tuna.tsinghua.edu.cn/gnu/"
#   RIBOSOME_MIRROR_FILE=configs/mirrors.conf

# GNU FTP -> TUNA (Tsinghua University)
https://ftp.gnu.org/gnu/=https://mirror.liys.online/gnu/

# Savannah -> TUNA
https://download.savannah.gnu.org/releases/=https://mirrors.tuna.tsinghua.edu.cn/savannah/
https://download.savannah.nongnu.org/releases/=https://mirrors.tuna.tsinghua.edu.cn/savannah/

# sourceware.org -> TUNA
https://sourceware.org/pub/=https://mirrors.tuna.tsinghua.edu.cn/sourceware/

# kernel.org -> TUNA
https://www.kernel.org/pub/=https://mirrors.tuna.tsinghua.edu.cn/kernel/
https://cdn.kernel.org/pub/=https://mirrors.tuna.tsinghua.cn/kernel/

# zlib.net -> sourceforge mirror
https://zlib.net/=https://github.com/madler/zlib/releases/download/v1.3.1/

# invisible-mirror.net (ncurses) -> GNU mirror
https://invisible-mirror.net/archives/ncurses/=https://ftp.gnu.org/gnu/ncurses/

# sourceforge direct links -> alternative mirror
# Note: SourceForge 403 on direct downloads; use mirror instead
