expat     = "2.6.4"
libxml2   = "2.13.5"
libarchive = "3.7.7"
libcap    = "2.70"
libseccomp = "2.5.5"
libtool   = "2.5.3"

# === 数学库 ===
gmp  = "6.3.0"
mpfr = "4.2.1"
mpc  = "1.3.1"

# === 系统工具 ===
