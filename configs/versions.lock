# LysineOS 版本锁文件
#
# 锁定每个包的精确版本号，确保构建可复现。
# MrnaIndex 在 resolve 时会优先使用此文件中的版本约束。
#
# 格式: 包名 = "版本号"
# 修改版本号后重新运行 bootstrap/build 即可切换版本。
# 未列出的包自动选最新可用版本。
#
# 维护策略：
#   - 升级版本时修改对应行即可
#   - 新增包时在此文件添加一行
#   - 配合 git 追踪变更历史

# === 核心系统 ===
linux-api-headers = "7.0"
linux-kernel      = "7.0"
glibc             = "2.43"
systemd           = "257"
gcc               = "14.2.0"
binutils          = "2.42"
bash              = "5.2.37"
coreutils         = "9.5"

# === 构建工具 ===
m4       = "1.4.19"
make     = "4.4.1"
autoconf = "2.72"
automake = "1.17"
cmake    = "3.31.0"
meson    = "1.6.0"
ninja    = "1.12.1"
pkgconf  = "2.2.0"

# === 交叉编译工具链 ===
cross-binutils  = "2.42"
cross-gcc       = "14.2.0"
cross-glibc     = "2.43"
cross-libstdcxx = "14.2.0"

# === 基础库 ===
